name: amarwave
description: >-
  Official Dart/Flutter client SDK for AmarWave real-time WebSocket messaging.
  Subscribe to public, private, and presence channels with built-in HMAC auth.
version: 1.0.1
homepage: https://amarwave.com
repository: https://github.com/amarwave/amarwave-flutter
issue_tracker: https://github.com/amarwave/amarwave-flutter/issues

topics:
  - websocket
  - realtime
  - messaging
  - pusher
  - networking

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  crypto: ^3.0.3
  http: ^1.1.0
  web_socket_channel: ^2.4.0

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0
